<!DOCTYPE html><html><head><meta charset='UTF-8'><title>NEURAL RESONANCE | AUDIO-VISUAL</title><link href='https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Orbitron:wght@900&display=swap' rel='stylesheet'><style>:root{--p:#00f2ff;--s:#7000ff;--bg:#000;}body{background:#000;color:#fff;font-family:monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;} .core-pulse{width:200px;height:200px;border:2px solid var(--p);border-radius:50%;box-shadow:0 0 50px var(--p);animation:pulse 2s infinite alternate;} @keyframes pulse{from{transform:scale(0.9);opacity:0.5;} to{transform:scale(1.1);opacity:1;}} .av-btn{background:var(--p);color:#000;border:none;padding:15px 40px;font-family:Orbitron;font-weight:900;margin-top:40px;cursor:pointer;clip-path:polygon(5% 0, 100% 0, 95% 100%, 0% 100%);} .status{margin-top:20px;font-size:10px;letter-spacing:3px;color:var(--p);}</style></head><body><div class='core-pulse'></div><h1 style='font-family:Syncopate;letter-spacing:10px;margin-top:30px;'>AV_RESONANCE_V180</h1><button class='av-btn' onclick='initAV()'>INITIALIZE_AUDIO_HANDSHAKE</button><div class='status' id='msg'>AWAITING_NEURAL_UPLINK...</div><script>function initAV(){const msg=document.getElementById('msg');msg.innerText='BROADCASTING_RESONANCE_PULSE...';const audioCtx=new(window.AudioContext||window.webkitAudioContext)();const osc=audioCtx.createOscillator();const g=audioCtx.createGain();osc.type='sine';osc.frequency.setValueAtTime(440,audioCtx.currentTime);osc.frequency.exponentialRampToValueAtTime(110,audioCtx.currentTime+1.5);g.gain.setValueAtTime(0.1,audioCtx.currentTime);g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+1.5);osc.connect(g);g.connect(audioCtx.destination);osc.start();osc.stop(audioCtx.currentTime+1.5);msg.innerText='HANDSHAKE_COMPLETE: FREQUENCY_STABILIZED';}</script></body></html>
